name: Daily LiviePop Users Table Backup

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pg_dump 17
        run: |
          sudo apt-get install -y gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run backup
        env:
          DATABASE_URL: ${{ vars.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups/users
          FILENAME="backups/users/users_$(date +'%Y-%m-%d').sql"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            --table=public.users \
            --data-only \
            --no-owner \
            --no-privileges \
            --format=plain \
            > "$FILENAME"

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/users/
          git diff --cached --quiet || git commit -m "chore: daily users backup $(date +'%Y-%m-%d')"
          git push